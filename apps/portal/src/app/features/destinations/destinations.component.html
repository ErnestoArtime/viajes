<ion-content fullscreen="true"><main class="shell"><header><span class="eyebrow">Empieza por un lugar</span><h1>Destinos que tienes que vivir.</h1><p>Cada destino conecta alojamientos, experiencias y traslados para que puedas armar el viaje completo.</p></header><section>@for (destination of destinations; track destination.name) { <a class="destination" routerLink="/buscar" [queryParams]="{ destination: destination.name }"><img [src]="destination.image" [alt]="destination.name"><div><span>Descubrir</span><h2>{{ destination.name }}</h2><p>{{ destination.description }}</p></div></a> }</section></main></ion-content>
